<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino El Dorado — Jackpot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#F0D080;--gold-dark:#8B6914;--dark:#060608;--dark2:#0E0E14;--dark3:#16161F;--border:rgba(201,168,76,0.18);--text:#E8DCC8;--text-dim:#6A6050;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(80,0,20,0.3) 0%,transparent 60%);}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(6,6,8,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{padding:7px 18px;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.balance-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}

.main{max-width:680px;margin:0 auto;padding:30px 20px;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.game-sub{text-align:center;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:30px;}

/* MACHINE */
.machine{background:linear-gradient(160deg,#1a0a00,#2d1200,#1a0a00);border:3px solid var(--gold-dark);padding:32px 24px;text-align:center;margin-bottom:20px;position:relative;box-shadow:0 0 60px rgba(201,168,76,0.08),inset 0 0 40px rgba(0,0,0,0.6);}
.machine::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,0.1);pointer-events:none;}
.machine-label{font-family:'Cinzel Decorative',serif;font-size:1.4rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;margin-bottom:24px;filter:drop-shadow(0 0 10px rgba(201,168,76,0.5));}

/* REELS */
.reels-container{display:flex;gap:12px;justify-content:center;margin-bottom:28px;}
.reel{width:110px;height:120px;background:rgba(0,0,0,0.6);border:2px solid rgba(201,168,76,0.3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden;box-shadow:inset 0 0 20px rgba(0,0,0,0.8);}
.reel::before,.reel::after{content:'';position:absolute;left:0;right:0;height:24px;z-index:2;pointer-events:none;}
.reel::before{top:0;background:linear-gradient(to bottom,rgba(26,10,0,0.9),transparent);}
.reel::after{bottom:0;background:linear-gradient(to top,rgba(26,10,0,0.9),transparent);}
.reel-symbol{transition:none;position:relative;z-index:1;}
.reel.spinning .reel-symbol{animation:spin-reel .1s linear infinite;}
@keyframes spin-reel{0%{transform:translateY(-20px);opacity:0;}50%{transform:translateY(0);opacity:1;}100%{transform:translateY(20px);opacity:0;}}
.reel.won{box-shadow:0 0 0 2px var(--gold),0 0 24px rgba(201,168,76,0.6),inset 0 0 20px rgba(201,168,76,0.1);animation:win-pulse 0.8s ease infinite;}
@keyframes win-pulse{0%,100%{box-shadow:0 0 0 2px var(--gold),0 0 24px rgba(201,168,76,0.5),inset 0 0 20px rgba(201,168,76,0.1);}50%{box-shadow:0 0 0 3px var(--gold-light),0 0 40px rgba(201,168,76,0.9),inset 0 0 30px rgba(201,168,76,0.2);}}

/* WIN LINE */
.win-line{height:4px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:-14px 0 14px;opacity:0;transition:opacity .3s;}
.win-line.visible{opacity:1;}

/* POT INFO */
.pot-info{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.pot-card{padding:14px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);text-align:center;}
.pot-val{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);}
.pot-label{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:4px;}

/* BET ROW */
.bet-row{margin-bottom:20px;}
.bet-row-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;text-align:center;}
.chips-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.chip{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .25s;border:3px dashed rgba(255,255,255,0.25);box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.chip:hover{transform:scale(1.1) translateY(-4px);}
.chip.selected{transform:scale(1.15) translateY(-6px);filter:brightness(1.2);}
.chip-5{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);color:#fff;}
.chip-10{background:radial-gradient(circle at 35% 35%,#60a5fa,#2563eb);color:#fff;}
.chip-25{background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a);color:#fff;}
.chip-50{background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed);color:#fff;}
.chip-100{background:radial-gradient(circle at 35% 35%,#fbbf24,#d97706);color:#fff;}

.btn-spin{width:100%;padding:18px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel Decorative',serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.btn-spin:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold-light));transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.4);}
.btn-spin:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-spin.spinning{background:linear-gradient(135deg,#8B6914,#a87e22);}

/* RESULT */
.result-box{padding:20px;text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:1px;margin-top:16px;border:1px solid;display:none;border-radius:2px;}
.result-win{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.5);color:#4ade80;}
.result-loss{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.4);color:#f87171;}
.result-box .amount{font-size:1.8rem;display:block;margin-top:8px;font-weight:700;}

/* HISTORY */
.history{margin-top:20px;}
.history-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;text-align:center;}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);font-size:.78rem;}
.h-reels{letter-spacing:4px;}
.h-result{font-family:'Cinzel',serif;}
.h-result.win{color:#4ade80;}
.h-result.loss{color:#f87171;}
</style>
</head>
<body>
<nav class="topnav">
  <a class="back-btn" href="/lobby.html">← Lobby</a>
  <div class="nav-logo">🎰 Jackpot</div>
  <div class="balance-display">$<span id="nav-balance">0</span></div>
</nav>

<div class="main">
  <div class="game-title">Jackpot</div>
  <div class="game-sub">Un solo ganador — Girá para ganar el pozo</div>

  <div class="machine">
    <div class="machine-label">★ JACKPOT ★</div>

    <div class="pot-info">
      <div class="pot-card">
        <div class="pot-val" id="pot-display">$0</div>
        <div class="pot-label">Pozo actual</div>
      </div>
      <div class="pot-card">
        <div class="pot-val" id="players-display">—</div>
        <div class="pot-label">Jugadores</div>
      </div>
      <div class="pot-card">
        <div class="pot-val" id="odds-display">—</div>
        <div class="pot-label">Tu chance</div>
      </div>
    </div>

    <div class="reels-container">
      <div class="reel" id="reel-1"><div class="reel-symbol" id="sym-1">🎰</div></div>
      <div class="reel" id="reel-2"><div class="reel-symbol" id="sym-2">🎰</div></div>
      <div class="reel" id="reel-3"><div class="reel-symbol" id="sym-3">🎰</div></div>
    </div>

    <div class="win-line" id="win-line"></div>

    <div class="bet-row">
      <div class="bet-row-label">Apuesta por giro</div>
      <div class="chips-row">
        <div class="chip chip-5"  onclick="selectBet(5)">$5</div>
        <div class="chip chip-10" onclick="selectBet(10)">$10</div>
        <div class="chip chip-25" onclick="selectBet(25)">$25</div>
        <div class="chip chip-50" onclick="selectBet(50)">$50</div>
        <div class="chip chip-100" onclick="selectBet(100)">$100</div>
      </div>
      <button class="btn-spin" id="spin-btn" onclick="spin()" disabled>🎰 GIRAR</button>
    </div>
  </div>

  <div class="result-box" id="result-box"></div>

  <div class="history">
    <div class="history-title">— Últimos Giros —</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('casino_token');
if (!token) window.location.href = '/index.html';

let selectedBet = 0, spinning = false;
const history = [];
const user = JSON.parse(localStorage.getItem('casino_user') || '{}');
document.getElementById('nav-balance').textContent = parseFloat(user.balance||0).toLocaleString('es-AR');

async function refreshBalance() {
  try {
    const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return; }
    const d = await res.json();
    document.getElementById('nav-balance').textContent = parseFloat(d.balance||0).toLocaleString('es-AR');
    localStorage.setItem('casino_user', JSON.stringify(d));
  } catch(e) {}
}
refreshBalance();

function selectBet(amount) {
  selectedBet = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  event.target.closest('.chip').classList.add('selected');
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('spin-btn').textContent = `🎰 GIRAR — Apuesta $${amount.toLocaleString('es-AR')}`;
}

const SYMBOLS = ['🍋','🍒','⭐','🔔','7️⃣','💎','🃏','🍀'];

async function spin() {
  if (!selectedBet || spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('spin-btn').classList.add('spinning');
  document.getElementById('spin-btn').textContent = '⏳ Girando...';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('win-line').classList.remove('visible');
  [1,2,3].forEach(i => {
    document.getElementById(`reel-${i}`).classList.remove('won');
    document.getElementById(`reel-${i}`).classList.add('spinning');
    document.getElementById(`sym-${i}`).textContent = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
  });

  try {
    const res = await fetch(`${API}/games/jackpot/spin`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ bet: selectedBet })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); endSpin(); return; }

    // Animate reels stopping one by one
    const [s1, s2, s3] = data.reels;
    setTimeout(() => stopReel(1, s1), 600);
    setTimeout(() => stopReel(2, s2), 1000);
    setTimeout(() => stopReel(3, s3), 1400);
    setTimeout(() => {
      showResult(data);
      endSpin();
      document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');
      // Update pot info
      const numP = data.numPlayers || 2;
      document.getElementById('pot-display').textContent = '$' + parseFloat(data.pot).toLocaleString('es-AR');
      document.getElementById('players-display').textContent = numP + ' jugadores';
      document.getElementById('odds-display').textContent = Math.round(100 / numP) + '%';
      addHistory(data.reels, data.won, data.prize, selectedBet);
      refreshBalance();
    }, 2000);
  } catch(e) { alert('Error de conexión'); endSpin(); }
}

function stopReel(num, symbol) {
  const reel = document.getElementById(`reel-${num}`);
  const sym = document.getElementById(`sym-${num}`);
  reel.classList.remove('spinning');
  sym.textContent = symbol;
}

function showResult(data) {
  const box = document.getElementById('result-box');
  box.style.display = 'block';
  if (data.won) {
    box.className = 'result-box result-win';
    box.innerHTML = `🎉 ¡JACKPOT! ¡Ganaste!<span class="amount">+$${parseFloat(data.prize).toLocaleString('es-AR')}</span>`;
    document.getElementById('win-line').classList.add('visible');
    [1,2,3].forEach(i => document.getElementById(`reel-${i}`).classList.add('won'));
    confetti();
  } else {
    box.className = 'result-box result-loss';
    box.innerHTML = `Sin suerte esta vez<span class="amount">-$${selectedBet.toLocaleString('es-AR')}</span>`;
  }
}

function endSpin() {
  spinning = false;
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('spin-btn').classList.remove('spinning');
  document.getElementById('spin-btn').textContent = `🎰 GIRAR — Apuesta $${selectedBet.toLocaleString('es-AR')}`;
}

function addHistory(reels, won, prize, bet) {
  history.unshift({ reels, won, prize, bet });
  if (history.length > 20) history.pop();
  document.getElementById('history-list').innerHTML = history.map(h => `
    <div class="history-item">
      <span class="h-reels">${h.reels.join(' ')}</span>
      <span class="h-result ${h.won ? 'win' : 'loss'}">${h.won ? '+$' + parseFloat(h.prize).toLocaleString('es-AR') : '-$' + h.bet.toLocaleString('es-AR')}</span>
    </div>`).join('');
}

function confetti() {
  const colors = ['#C9A84C','#F0D080','#fff','#ff6b6b','#4ade80'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    const size = Math.random() * 10 + 5;
    el.style.cssText = `
      position:fixed;top:${Math.random()*30}%;left:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      pointer-events:none;z-index:9999;
      animation:confetti-fall ${1.5+Math.random()*2}s ease forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
  const style = document.createElement('style');
  style.textContent = `@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(${Math.random()*720-360}deg);opacity:0;}}`;
  document.head.appendChild(style);
}
</script>
</body>
</html>
