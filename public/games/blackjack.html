<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino El Dorado — Blackjack</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#F0D080;--gold-dark:#8B6914;--dark:#060608;--dark2:#0E0E14;--dark3:#16161F;--border:rgba(201,168,76,0.18);--text:#E8DCC8;--text-dim:#6A6050;--green:#1B5E20;--felt:#0D3B17;--felt2:#0A2E12;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(27,94,32,0.25) 0%,transparent 60%);}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(6,6,8,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{padding:7px 18px;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.balance-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}

.main{max-width:800px;margin:0 auto;padding:30px 20px;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.game-sub{text-align:center;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:30px;}

/* BET SELECTOR */
.bet-panel{background:linear-gradient(160deg,var(--dark2),var(--dark3));border:1px solid var(--border);padding:28px;margin-bottom:20px;}
.panel-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;}
.chips-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.chip{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s;position:relative;border:3px dashed rgba(255,255,255,0.25);box-shadow:0 4px 14px rgba(0,0,0,0.5);user-select:none;}
.chip:hover{transform:scale(1.1) translateY(-4px);box-shadow:0 10px 24px rgba(0,0,0,0.6);}
.chip.selected{transform:scale(1.15) translateY(-6px);}
.chip-5{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);color:#fff;}
.chip-10{background:radial-gradient(circle at 35% 35%,#60a5fa,#2563eb);color:#fff;}
.chip-25{background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a);color:#fff;}
.chip-50{background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed);color:#fff;}
.chip-100{background:radial-gradient(circle at 35% 35%,#fbbf24,#d97706);color:#fff;}
.chip-500{background:radial-gradient(circle at 35% 35%,#f9a8d4,#be185d);color:#fff;}
.chip.selected::after{content:'✓';position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--gold);font-family:'Cinzel',serif;}

.selected-bet{text-align:center;font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold);margin-bottom:16px;min-height:28px;}
.btn-deal{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-deal:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold-light));transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
.btn-deal:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* TABLE */
.felt-table{background:radial-gradient(ellipse at center,#165a22 0%,var(--felt) 60%,#061a09 100%);border:3px solid var(--gold-dark);padding:32px 24px;position:relative;margin-bottom:20px;box-shadow:inset 0 0 60px rgba(0,0,0,0.6),0 0 40px rgba(0,0,0,0.5);}
.felt-table::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,0.15);pointer-events:none;}
.zone{margin-bottom:24px;text-align:center;}
.zone-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:14px;}
.cards-row{display:flex;gap:10px;justify-content:center;min-height:115px;align-items:flex-end;flex-wrap:wrap;}
.card{width:76px;height:110px;background:#fff;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.5);position:relative;animation:deal-in .3s cubic-bezier(.34,1.56,.64,1) forwards;flex-shrink:0;}
@keyframes deal-in{from{opacity:0;transform:translateY(-40px) rotate(-8deg);}to{opacity:1;transform:translateY(0) rotate(0);}}
.card-rank{font-size:1.5rem;font-weight:900;line-height:1;}
.card-suit{font-size:1.2rem;line-height:1;}
.card.red{color:#dc2626;}
.card.black{color:#111;}
.card.face-down{background:linear-gradient(135deg,#1e1b4b,#312e81);}
.card.face-down::after{content:'♦';position:absolute;font-size:3rem;color:rgba(99,102,241,0.3);}
.score-tag{display:inline-block;padding:4px 14px;font-family:'Cinzel',serif;font-size:.82rem;background:rgba(0,0,0,0.5);border:1px solid rgba(201,168,76,0.25);color:var(--gold);margin-top:10px;border-radius:2px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent);margin:8px 0 20px;}

/* ACTION BUTTONS */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.btn-action{padding:12px 28px;font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all .2s;background:transparent;}
.btn-hit{border-color:#27ae60;color:#27ae60;}
.btn-hit:hover{background:rgba(39,174,96,.15);}
.btn-stand{border-color:var(--gold);color:var(--gold);}
.btn-stand:hover{background:rgba(201,168,76,.12);}
.btn-double{border-color:#3b82f6;color:#3b82f6;}
.btn-double:hover{background:rgba(59,130,246,.12);}

/* RESULT */
.result-box{padding:20px;border-radius:2px;text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:1px;margin-bottom:16px;display:none;}
.result-win{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.5);color:#4ade80;}
.result-loss{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.5);color:#f87171;}
.result-draw{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);color:var(--gold);}
.result-box .amount{font-size:1.6rem;display:block;margin-top:6px;}

.btn-new{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;display:none;}
.btn-new:hover{background:linear-gradient(135deg,var(--gold),var(--gold-light));}

.rules-strip{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;padding:16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);font-size:.72rem;color:var(--text-dim);text-align:center;}
.rules-strip span{display:flex;flex-direction:column;gap:3px;}
.rules-strip strong{color:var(--text);font-size:.8rem;}
</style>
</head>
<body>
<nav class="topnav">
  <a class="back-btn" href="/lobby.html">← Lobby</a>
  <div class="nav-logo">♠ Blackjack</div>
  <div class="balance-display">$<span id="nav-balance">0</span></div>
</nav>

<div class="main">
  <div class="game-title">Blackjack</div>
  <div class="game-sub">Llegá a 21 — La casa paga el 80%</div>

  <!-- BET PANEL -->
  <div class="bet-panel" id="bet-panel">
    <div class="panel-title">Seleccioná tu apuesta</div>
    <div class="chips-row">
      <div class="chip chip-5"   onclick="selectBet(5)">$5</div>
      <div class="chip chip-10"  onclick="selectBet(10)">$10</div>
      <div class="chip chip-25"  onclick="selectBet(25)">$25</div>
      <div class="chip chip-50"  onclick="selectBet(50)">$50</div>
      <div class="chip chip-100" onclick="selectBet(100)">$100</div>
      <div class="chip chip-500" onclick="selectBet(500)">$500</div>
    </div>
    <div class="selected-bet" id="selected-bet-display">—</div>
    <button class="btn-deal" id="deal-btn" onclick="deal()" disabled>Repartir Cartas</button>
  </div>

  <!-- FELT TABLE -->
  <div class="felt-table" id="felt-table" style="display:none">
    <div class="zone">
      <div class="zone-label">🏦 Croupier</div>
      <div class="cards-row" id="dealer-cards"></div>
      <div class="score-tag" id="dealer-score">?</div>
    </div>
    <div class="divider"></div>
    <div class="zone">
      <div class="zone-label">👤 Tu Mano</div>
      <div class="cards-row" id="player-cards"></div>
      <div class="score-tag" id="player-score">0</div>
    </div>
  </div>

  <div class="result-box" id="result-box"></div>

  <div class="actions" id="actions" style="display:none">
    <button class="btn-action btn-hit"    onclick="hit()">Pedir Carta</button>
    <button class="btn-action btn-stand"  onclick="stand()">Plantarse</button>
    <button class="btn-action btn-double" onclick="doubleDown()" id="double-btn">Doblar ×2</button>
  </div>

  <button class="btn-new" id="btn-new" onclick="newRound()">Nueva Mano</button>

  <div class="rules-strip" style="margin-top:16px">
    <span><strong>Objetivo</strong>Llegá a 21 sin pasarte</span>
    <span><strong>Casa para</strong>Con 17 o más</span>
    <span><strong>Premio</strong>80% del pozo</span>
    <span><strong>Doblar</strong>Solo con 2 cartas</span>
    <span><strong>Empate</strong>Te devuelven la apuesta</span>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('casino_token');
if (!token) window.location.href = '/index.html';

const user = JSON.parse(localStorage.getItem('casino_user') || '{}');
let selectedBet = 0;
let sessionId = null;
let gameActive = false;

document.getElementById('nav-balance').textContent = parseFloat(user.balance||0).toLocaleString('es-AR');

async function refreshBalance() {
  try {
    const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return; }
    const data = await res.json();
    document.getElementById('nav-balance').textContent = parseFloat(data.balance||0).toLocaleString('es-AR');
    localStorage.setItem('casino_user', JSON.stringify(data));
  } catch(e) {}
}
refreshBalance();

function selectBet(amount) {
  selectedBet = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  event.target.closest('.chip').classList.add('selected');
  document.getElementById('selected-bet-display').textContent = `Apuesta: $${amount.toLocaleString('es-AR')}`;
  document.getElementById('deal-btn').disabled = false;
}

function cardHTML(card, facedown = false, delay = 0) {
  if (facedown) return `<div class="card face-down" style="animation-delay:${delay}s"></div>`;
  const isRed = ['♥','♦'].includes(card.s);
  return `<div class="card ${isRed?'red':'black'}" style="animation-delay:${delay}s">
    <div class="card-rank">${card.r}</div>
    <div class="card-suit">${card.s}</div>
  </div>`;
}

async function deal() {
  if (!selectedBet) return;
  document.getElementById('deal-btn').disabled = true;
  try {
    const res = await fetch(`${API}/games/blackjack/deal`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ bet: selectedBet })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); document.getElementById('deal-btn').disabled = false; return; }

    sessionId = data.sessionId;
    gameActive = true;

    document.getElementById('bet-panel').style.display = 'none';
    document.getElementById('felt-table').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('btn-new').style.display = 'none';

    renderDealerCards([data.dealerCard], true);
    renderPlayerCards(data.playerCards);
    document.getElementById('player-score').textContent = 'Total: ' + data.playerValue;
    document.getElementById('dealer-score').textContent = '?';

    if (data.blackjack) {
      document.getElementById('actions').style.display = 'none';
      setTimeout(() => stand(), 600);
    } else {
      document.getElementById('actions').style.display = 'flex';
      document.getElementById('double-btn').disabled = false;
    }
  } catch(e) { alert('Error de conexión'); document.getElementById('deal-btn').disabled = false; }
}

function renderPlayerCards(cards) {
  document.getElementById('player-cards').innerHTML = cards.map((c,i) => cardHTML(c, false, i*0.1)).join('');
}
function renderDealerCards(cards, hideSecond = false) {
  let html = cards.map((c,i) => {
    if (hideSecond && i === 1) return cardHTML(null, true, 0.1);
    return cardHTML(c, false, i*0.1);
  }).join('');
  document.getElementById('dealer-cards').innerHTML = html;
}

async function hit() {
  if (!gameActive) return;
  try {
    const res = await fetch(`${API}/games/blackjack/hit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    renderPlayerCards(data.playerCards);
    document.getElementById('player-score').textContent = 'Total: ' + data.playerValue;
    document.getElementById('double-btn').disabled = true;
    if (data.bust) { gameActive = false; showResult('bust', 0, selectedBet); }
  } catch(e) {}
}

async function stand() {
  if (!gameActive) return;
  gameActive = false;
  document.getElementById('actions').style.display = 'none';
  try {
    const res = await fetch(`${API}/games/blackjack/stand`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    renderDealerCards(data.dealerCards, false);
    document.getElementById('dealer-score').textContent = 'Total: ' + data.dealerValue;
    document.getElementById('player-score').textContent = 'Total: ' + data.playerValue;
    document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');
    showResult(data.result, data.prize, selectedBet);
  } catch(e) {}
}

async function doubleDown() {
  if (!gameActive) return;
  gameActive = false;
  document.getElementById('actions').style.display = 'none';
  try {
    const res = await fetch(`${API}/games/blackjack/double`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    renderDealerCards(data.dealerCards, false);
    renderPlayerCards(data.playerCards);
    document.getElementById('dealer-score').textContent = 'Total: ' + data.dealerValue;
    document.getElementById('player-score').textContent = 'Total: ' + data.playerValue;
    document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');
    showResult(data.result, data.prize, selectedBet * 2);
  } catch(e) {}
}

function showResult(result, prize, bet) {
  const box = document.getElementById('result-box');
  box.style.display = 'block';
  const msgs = {
    win: { cls: 'result-win', text: '¡Ganaste!', sub: `+$${parseFloat(prize).toLocaleString('es-AR')}` },
    loss: { cls: 'result-loss', text: 'Perdiste', sub: `-$${parseFloat(bet).toLocaleString('es-AR')}` },
    draw: { cls: 'result-draw', text: 'Empate — Apuesta devuelta', sub: '' },
    bust: { cls: 'result-loss', text: 'Te pasaste de 21', sub: `-$${parseFloat(bet).toLocaleString('es-AR')}` },
  };
  const m = msgs[result] || msgs.loss;
  box.className = `result-box ${m.cls}`;
  box.innerHTML = `${m.text}<span class="amount">${m.sub}</span>`;
  document.getElementById('btn-new').style.display = 'block';
  refreshBalance();
}

function newRound() {
  sessionId = null; gameActive = false; selectedBet = 0;
  document.getElementById('bet-panel').style.display = 'block';
  document.getElementById('felt-table').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('btn-new').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('deal-btn').disabled = true;
  document.getElementById('selected-bet-display').textContent = '—';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
}
</script>
</body>
</html>
