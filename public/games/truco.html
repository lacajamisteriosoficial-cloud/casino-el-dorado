<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino El Dorado — Truco</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#F0D080;--gold-dark:#8B6914;--dark:#060608;--dark2:#0E0E14;--dark3:#16161F;--border:rgba(201,168,76,0.18);--text:#E8DCC8;--text-dim:#6A6050;--felt:#2D1200;--felt2:#1a0900;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(80,30,0,0.3) 0%,transparent 60%);}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(6,6,8,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{padding:7px 18px;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.balance-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}

.main{max-width:800px;margin:0 auto;padding:30px 20px;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.game-sub{text-align:center;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:30px;}

.bet-panel{background:linear-gradient(160deg,var(--dark2),var(--dark3));border:1px solid var(--border);padding:28px;margin-bottom:20px;}
.panel-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;}
.chips-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.chip{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .25s;border:3px dashed rgba(255,255,255,0.25);box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.chip:hover{transform:scale(1.1) translateY(-4px);}
.chip.selected{transform:scale(1.15) translateY(-6px);box-shadow:0 10px 24px currentColor;}
.chip-5{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);color:#fff;}
.chip-10{background:radial-gradient(circle at 35% 35%,#60a5fa,#2563eb);color:#fff;}
.chip-25{background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a);color:#fff;}
.chip-50{background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed);color:#fff;}
.chip-100{background:radial-gradient(circle at 35% 35%,#fbbf24,#d97706);color:#fff;}
.selected-bet{text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin-bottom:14px;min-height:26px;}
.btn-start{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-start:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold-light));transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;}

/* TABLE */
.felt-table{background:radial-gradient(ellipse at center,#3d1800 0%,#2a1000 60%,#0d0600 100%);border:3px solid var(--gold-dark);padding:28px 20px;position:relative;margin-bottom:20px;box-shadow:inset 0 0 60px rgba(0,0,0,0.7);}
.felt-table::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,0.12);pointer-events:none;}
.zone{margin-bottom:20px;text-align:center;}
.zone-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:12px;}

/* TRUCO CARDS */
.hand{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;min-height:120px;align-items:flex-end;}
.tcard{width:78px;height:114px;background:#fff;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.6);cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid #ddd;flex-shrink:0;}
.tcard:hover:not(.played){transform:translateY(-16px);box-shadow:0 14px 28px rgba(0,0,0,0.7);}
.tcard.played{opacity:.35;cursor:not-allowed;}
.tcard.face-down{background:linear-gradient(135deg,#1e1b4b,#312e81);cursor:default;}
.tcard.face-down:hover{transform:none;}
.tcard-rank{font-size:1.6rem;font-weight:900;line-height:1;}
.tcard-suit{font-size:1.2rem;line-height:1;}
.tcard.red{color:#dc2626;}
.tcard.black{color:#111;}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);margin:4px 0 16px;}

/* SCOREBOARD */
.scoreboard{display:flex;justify-content:center;gap:40px;margin:16px 0;}
.score-item{text-align:center;}
.score-val{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--gold);}
.score-label{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}

/* ACTIONS */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.btn-action{padding:11px 24px;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all .2s;background:transparent;}
.btn-truco{border-color:var(--gold);color:var(--gold);}
.btn-truco:hover{background:rgba(201,168,76,.12);}
.btn-envido{border-color:#60a5fa;color:#60a5fa;}
.btn-envido:hover{background:rgba(96,165,250,.12);}
.btn-fold{border-color:#ef4444;color:#ef4444;}
.btn-fold:hover{background:rgba(239,68,68,.12);}

.msg-box{padding:16px;text-align:center;font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:1px;margin-bottom:14px;border:1px solid;display:none;}
.msg-win{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.5);color:#4ade80;}
.msg-loss{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.5);color:#f87171;}
.msg-info{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold);}
.pot-display{text-align:center;font-family:'Cinzel',serif;font-size:.8rem;color:var(--text-dim);margin-bottom:12px;}
.pot-display strong{color:var(--gold);}

.btn-new{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;display:none;}
.btn-new:hover{background:linear-gradient(135deg,var(--gold),var(--gold-light));}
</style>
</head>
<body>
<nav class="topnav">
  <a class="back-btn" href="/lobby.html">← Lobby</a>
  <div class="nav-logo">🃏 Truco</div>
  <div class="balance-display">$<span id="nav-balance">0</span></div>
</nav>

<div class="main">
  <div class="game-title">Truco</div>
  <div class="game-sub">El clásico argentino — Mejor de 3 rondas</div>

  <div class="bet-panel" id="bet-panel">
    <div class="panel-title">Seleccioná tu apuesta</div>
    <div class="chips-row">
      <div class="chip chip-5"  onclick="selectBet(5)">$5</div>
      <div class="chip chip-10" onclick="selectBet(10)">$10</div>
      <div class="chip chip-25" onclick="selectBet(25)">$25</div>
      <div class="chip chip-50" onclick="selectBet(50)">$50</div>
      <div class="chip chip-100" onclick="selectBet(100)">$100</div>
    </div>
    <div class="selected-bet" id="selected-bet-display">—</div>
    <button class="btn-start" id="start-btn" onclick="startGame()" disabled>Empezar Partida</button>
  </div>

  <div id="game-area" style="display:none">
    <div class="scoreboard">
      <div class="score-item">
        <div class="score-val" id="cpu-pts">0</div>
        <div class="score-label">🤖 CPU</div>
      </div>
      <div style="font-family:'Cinzel',serif;font-size:1.2rem;color:var(--text-dim);align-self:center">VS</div>
      <div class="score-item">
        <div class="score-val" id="player-pts">0</div>
        <div class="score-label">👤 Vos</div>
      </div>
    </div>

    <div class="felt-table">
      <div class="zone">
        <div class="zone-label">🤖 Mano del CPU</div>
        <div class="hand" id="cpu-hand"></div>
        <div id="cpu-played-area" style="min-height:30px;margin-top:8px"></div>
      </div>
      <div class="divider"></div>
      <div class="zone">
        <div class="zone-label">👤 Tu mano — Tocá una carta para jugarla</div>
        <div class="hand" id="player-hand"></div>
        <div id="player-played-area" style="min-height:30px;margin-top:8px"></div>
      </div>
    </div>

    <div class="pot-display">Pozo: <strong id="pot-amount">$0</strong></div>
    <div class="msg-box" id="msg-box"></div>

    <div class="actions" id="actions">
      <button class="btn-action btn-truco" onclick="callTruco()">Cantar TRUCO</button>
      <button class="btn-action btn-envido" onclick="callEnvido()">Cantar ENVIDO</button>
      <button class="btn-action btn-fold" onclick="fold()">Ir al Mazo</button>
    </div>

    <button class="btn-new" id="btn-new" onclick="newGame()">Nueva Mano</button>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('casino_token');
if (!token) window.location.href = '/index.html';

let selectedBet = 0, sessionId = null, gameState = null, playerHand = [];
let trucoCalled = false, envidoCalled = false;

const user = JSON.parse(localStorage.getItem('casino_user') || '{}');
document.getElementById('nav-balance').textContent = parseFloat(user.balance||0).toLocaleString('es-AR');

async function refreshBalance() {
  try {
    const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return; }
    const d = await res.json();
    document.getElementById('nav-balance').textContent = parseFloat(d.balance||0).toLocaleString('es-AR');
    localStorage.setItem('casino_user', JSON.stringify(d));
  } catch(e) {}
}
refreshBalance();

function selectBet(amount) {
  selectedBet = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  event.target.closest('.chip').classList.add('selected');
  document.getElementById('selected-bet-display').textContent = `Apuesta: $${amount.toLocaleString('es-AR')}`;
  document.getElementById('start-btn').disabled = false;
}

async function startGame() {
  document.getElementById('start-btn').disabled = true;
  try {
    const res = await fetch(`${API}/games/truco/start`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ bet: selectedBet })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); document.getElementById('start-btn').disabled=false; return; }

    sessionId = data.sessionId;
    playerHand = data.playerHand;
    trucoCalled = false; envidoCalled = false;

    document.getElementById('bet-panel').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('btn-new').style.display = 'none';
    document.getElementById('actions').style.display = 'flex';
    document.getElementById('msg-box').style.display = 'none';
    document.getElementById('player-pts').textContent = '0';
    document.getElementById('cpu-pts').textContent = '0';
    document.getElementById('pot-amount').textContent = '$' + (selectedBet*2).toLocaleString('es-AR');

    renderCPUHand(3);
    renderPlayerHand(playerHand, []);
    showMsg('¡Que empiece el Truco! Jugá una carta o cantá.', 'info');
  } catch(e) { alert('Error de conexión'); document.getElementById('start-btn').disabled=false; }
}

function renderCPUHand(count) {
  document.getElementById('cpu-hand').innerHTML = Array(count).fill(0).map(() =>
    `<div class="tcard face-down"></div>`
  ).join('');
}

function renderPlayerHand(hand, playedIndices) {
  document.getElementById('player-hand').innerHTML = hand.map((c, i) => {
    const played = playedIndices.includes(i);
    const isRed = ['♥','♦'].includes(c.s);
    return `<div class="tcard ${isRed?'red':'black'} ${played?'played':''}" onclick="playCard(${i})">
      <div class="tcard-rank">${c.r}</div>
      <div class="tcard-suit">${c.s}</div>
    </div>`;
  }).join('');
}

let playedPlayerIndices = [];
let roundNum = 0;

async function playCard(index) {
  if (playedPlayerIndices.includes(index)) return;
  try {
    const res = await fetch(`${API}/games/truco/play-card`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ sessionId, cardIndex: index })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); return; }

    playedPlayerIndices.push(index);
    roundNum++;
    renderPlayerHand(playerHand, playedPlayerIndices);

    const pCard = data.playerCard;
    const cCard = data.cpuCard;
    const isRedP = ['♥','♦'].includes(pCard.s);
    const isRedC = ['♥','♦'].includes(cCard.s);

    document.getElementById('player-played-area').innerHTML =
      `<div style="display:flex;justify-content:center;gap:8px;margin-top:6px">
        <div style="font-size:.65rem;color:rgba(255,255,255,.3);align-self:center">Jugaste:</div>
        <div class="tcard ${isRedP?'red':'black'}" style="width:52px;height:76px;cursor:default">
          <div class="tcard-rank" style="font-size:1rem">${pCard.r}</div>
          <div class="tcard-suit" style="font-size:.9rem">${pCard.s}</div>
        </div>
      </div>`;

    document.getElementById('cpu-played-area').innerHTML =
      `<div style="display:flex;justify-content:center;gap:8px;margin-top:6px">
        <div style="font-size:.65rem;color:rgba(255,255,255,.3);align-self:center">CPU jugó:</div>
        <div class="tcard ${isRedC?'red':'black'}" style="width:52px;height:76px;cursor:default">
          <div class="tcard-rank" style="font-size:1rem">${cCard.r}</div>
          <div class="tcard-suit" style="font-size:.9rem">${cCard.s}</div>
        </div>
      </div>`;

    document.getElementById('player-pts').textContent = data.playerPts;
    document.getElementById('cpu-pts').textContent = data.cpuPts;

    const roundWon = data.playerValue > data.cpuValue ? 'win' : data.cpuValue > data.playerValue ? 'loss' : 'draw';
    const roundMsg = roundWon === 'win'
      ? `✅ Ronda ${roundNum}: Ganaste! Tu ${pCard.r}${pCard.s} (${data.playerValue}) venció al ${cCard.r}${cCard.s} (${data.cpuValue})`
      : roundWon === 'loss'
      ? `❌ Ronda ${roundNum}: CPU ganó. Su ${cCard.r}${cCard.s} (${data.cpuValue}) vs tu ${pCard.r}${pCard.s} (${data.playerValue})`
      : `🤝 Ronda ${roundNum}: Empate. ${pCard.r}${pCard.s} vs ${cCard.r}${cCard.s}`;

    showMsg(roundMsg, roundWon);

    if (data.gameOver) {
      document.getElementById('actions').style.display = 'none';
      document.getElementById('btn-new').style.display = 'block';
      document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');

      setTimeout(() => {
        if (data.result === 'win') showMsg(`🏆 ¡GANASTE el Truco! Premio: +$${parseFloat(data.prize).toLocaleString('es-AR')}`, 'win');
        else if (data.result === 'loss') showMsg(`😔 CPU ganó el Truco. Perdiste $${selectedBet.toLocaleString('es-AR')}`, 'loss');
        else showMsg('🤝 Empate — Te devolvemos tu apuesta', 'info');
        refreshBalance();
      }, 600);
    }
  } catch(e) { console.error(e); }
}

async function callTruco() {
  if (trucoCalled) return;
  trucoCalled = true;
  const pot = selectedBet * 3;
  document.getElementById('pot-amount').textContent = '$' + pot.toLocaleString('es-AR');
  showMsg('🃏 ¡TRUCO! El pozo subió. Seguí jugando cartas.', 'info');
}

async function callEnvido() {
  if (envidoCalled) return;
  envidoCalled = true;
  const myEnvido = Math.floor(Math.random() * 33);
  const cpuEnvido = Math.floor(Math.random() * 33);
  const won = myEnvido > cpuEnvido;
  const bonus = Math.round(selectedBet * 0.3);
  if (won) {
    // Reward envido (local simulation)
    showMsg(`📊 ENVIDO: Vos ${myEnvido} vs CPU ${cpuEnvido}. ¡Ganaste el envido! +$${bonus}`, 'win');
  } else {
    showMsg(`📊 ENVIDO: Vos ${myEnvido} vs CPU ${cpuEnvido}. Perdiste el envido.`, 'loss');
  }
}

async function fold() {
  if (!confirm('¿Seguro que querés irte al mazo?')) return;
  document.getElementById('actions').style.display = 'none';
  document.getElementById('btn-new').style.display = 'block';
  try {
    const res = await fetch(`${API}/games/truco/fold`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');
    showMsg('🏳️ Te fuiste al mazo. El CPU gana la mano.', 'loss');
    refreshBalance();
  } catch(e) {}
}

function showMsg(text, type = 'info') {
  const el = document.getElementById('msg-box');
  el.textContent = text;
  el.className = `msg-box msg-${type}`;
  el.style.display = 'block';
}

function newGame() {
  sessionId = null; selectedBet = 0; playerHand = []; playedPlayerIndices = []; roundNum = 0;
  trucoCalled = false; envidoCalled = false;
  document.getElementById('bet-panel').style.display = 'block';
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('selected-bet-display').textContent = '—';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
}
</script>
</body>
</html>
