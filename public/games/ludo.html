<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino El Dorado — Ludo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#F0D080;--gold-dark:#8B6914;--dark:#060608;--dark2:#0E0E14;--dark3:#16161F;--border:rgba(201,168,76,0.18);--text:#E8DCC8;--text-dim:#6A6050;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(0,30,80,0.3) 0%,transparent 60%);}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(6,6,8,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{padding:7px 18px;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.balance-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}

.main{max-width:700px;margin:0 auto;padding:30px 20px;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(180deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.game-sub{text-align:center;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:30px;}

.bet-panel{background:linear-gradient(160deg,var(--dark2),var(--dark3));border:1px solid var(--border);padding:28px;margin-bottom:20px;}
.panel-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;}
.chips-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.chip{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .25s;border:3px dashed rgba(255,255,255,0.25);box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.chip:hover{transform:scale(1.1) translateY(-4px);}
.chip.selected{transform:scale(1.15) translateY(-6px);}
.chip-5{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);color:#fff;}
.chip-10{background:radial-gradient(circle at 35% 35%,#60a5fa,#2563eb);color:#fff;}
.chip-25{background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a);color:#fff;}
.chip-50{background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed);color:#fff;}
.chip-100{background:radial-gradient(circle at 35% 35%,#fbbf24,#d97706);color:#fff;}
.selected-bet{text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin-bottom:14px;min-height:26px;}
.btn-start{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-start:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold-light));transform:translateY(-1px);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;}

/* PLAYERS PANEL */
.players-panel{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.player-slot{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);padding:14px 20px;text-align:center;min-width:110px;transition:border-color .2s;}
.player-slot.active-turn{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.2);}
.player-slot.you{border-color:rgba(96,165,250,.4);}
.ps-name{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);letter-spacing:1px;}
.ps-pos{font-size:.72rem;color:var(--text-dim);margin-top:4px;}
.ps-status{font-size:.68rem;margin-top:4px;}

/* PROGRESS BARS */
.progress-area{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);padding:24px;margin-bottom:20px;}
.progress-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-bottom:20px;}
.player-progress{margin-bottom:16px;}
.pp-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.8rem;}
.pp-name{}
.pp-val{font-family:'Cinzel',serif;}
.pp-bar-bg{height:14px;background:rgba(255,255,255,.06);border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.pp-bar{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative;}
.pp-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2));}

/* DICE AREA */
.dice-area{text-align:center;padding:24px;background:linear-gradient(160deg,var(--dark2),var(--dark3));border:1px solid var(--border);margin-bottom:16px;}
.dice-display{font-size:4rem;margin-bottom:16px;min-height:70px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));}
.btn-roll{padding:14px 40px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-roll:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold-light));transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
.btn-roll:disabled{opacity:.4;cursor:not-allowed;}

.msg-box{padding:14px;text-align:center;font-family:'Cinzel',serif;font-size:.85rem;margin-bottom:12px;border:1px solid;display:none;}
.msg-win{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.5);color:#4ade80;}
.msg-loss{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.5);color:#f87171;}
.msg-info{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold);}
.pot-display{text-align:center;font-family:'Cinzel',serif;font-size:.8rem;color:var(--text-dim);margin-bottom:14px;}
.pot-display strong{color:var(--gold);}
.btn-new{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:#0A0805;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;display:none;}
.btn-new:hover{background:linear-gradient(135deg,var(--gold),var(--gold-light));}

.dice-faces{font-size:2rem;}
</style>
</head>
<body>
<nav class="topnav">
  <a class="back-btn" href="/lobby.html">← Lobby</a>
  <div class="nav-logo">🎲 Ludo</div>
  <div class="balance-display">$<span id="nav-balance">0</span></div>
</nav>

<div class="main">
  <div class="game-title">Ludo</div>
  <div class="game-sub">Primero al centro gana el pozo</div>

  <div class="bet-panel" id="bet-panel">
    <div class="panel-title">Seleccioná tu apuesta</div>
    <div class="chips-row">
      <div class="chip chip-5"  onclick="selectBet(5)">$5</div>
      <div class="chip chip-10" onclick="selectBet(10)">$10</div>
      <div class="chip chip-25" onclick="selectBet(25)">$25</div>
      <div class="chip chip-50" onclick="selectBet(50)">$50</div>
      <div class="chip chip-100" onclick="selectBet(100)">$100</div>
    </div>
    <div class="selected-bet" id="selected-bet-display">—</div>
    <button class="btn-start" id="start-btn" onclick="startGame()" disabled>Iniciar Partida</button>
  </div>

  <div id="game-area" style="display:none">
    <div class="players-panel" id="players-panel"></div>
    <div class="progress-area">
      <div class="progress-title">— Progreso al Centro (57 casillas) —</div>
      <div id="progress-bars"></div>
    </div>
    <div class="dice-area">
      <div class="dice-display" id="dice-display">🎲</div>
      <button class="btn-roll" id="roll-btn" onclick="rollDice()">🎲 Tirar Dado</button>
    </div>
    <div class="pot-display">Pozo: <strong id="pot-amount">$0</strong></div>
    <div class="msg-box" id="msg-box"></div>
    <button class="btn-new" id="btn-new" onclick="newGame()">Nueva Partida</button>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('casino_token');
if (!token) window.location.href = '/index.html';

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
const COLORS = {
  player: { name: '🔴 Vos', color: '#ef4444', bg: '#7f1d1d' },
  cpu1:   { name: '🔵 CPU 1', color: '#3b82f6', bg: '#1e3a5f' },
  cpu2:   { name: '🟢 CPU 2', color: '#22c55e', bg: '#14532d' }
};

let selectedBet = 0, sessionId = null, positions = { player:0, cpu1:0, cpu2:0 }, gameOver = false;
const user = JSON.parse(localStorage.getItem('casino_user') || '{}');
document.getElementById('nav-balance').textContent = parseFloat(user.balance||0).toLocaleString('es-AR');

async function refreshBalance() {
  try {
    const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return; }
    const d = await res.json();
    document.getElementById('nav-balance').textContent = parseFloat(d.balance||0).toLocaleString('es-AR');
    localStorage.setItem('casino_user', JSON.stringify(d));
  } catch(e) {}
}
refreshBalance();

function selectBet(amount) {
  selectedBet = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  event.target.closest('.chip').classList.add('selected');
  document.getElementById('selected-bet-display').textContent = `Apuesta: $${amount.toLocaleString('es-AR')}`;
  document.getElementById('start-btn').disabled = false;
}

async function startGame() {
  document.getElementById('start-btn').disabled = true;
  try {
    const res = await fetch(`${API}/games/ludo/start`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ bet: selectedBet })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); document.getElementById('start-btn').disabled=false; return; }

    sessionId = data.sessionId;
    positions = { player:0, cpu1:0, cpu2:0 };
    gameOver = false;

    document.getElementById('bet-panel').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('btn-new').style.display = 'none';
    document.getElementById('msg-box').style.display = 'none';
    document.getElementById('roll-btn').disabled = false;
    document.getElementById('pot-amount').textContent = '$' + (data.pot || selectedBet * 3).toLocaleString('es-AR');

    renderPlayers('player');
    renderBars();
    showMsg('¡Tu turno! Tirá el dado.', 'info');
  } catch(e) { alert('Error de conexión'); document.getElementById('start-btn').disabled=false; }
}

function renderPlayers(activeTurn) {
  document.getElementById('players-panel').innerHTML = Object.entries(COLORS).map(([k, c]) => `
    <div class="player-slot ${k === 'player' ? 'you' : ''} ${k === activeTurn ? 'active-turn' : ''}">
      <div class="ps-name">${c.name}</div>
      <div class="ps-pos">${positions[k]} / 57</div>
      <div class="ps-status">${positions[k] >= 57 ? '🏁 Llegó' : k === activeTurn ? '🎲 Turno' : '⏳'}</div>
    </div>`).join('');
}

function renderBars() {
  document.getElementById('progress-bars').innerHTML = Object.entries(COLORS).map(([k, c]) => {
    const pct = (positions[k] / 57) * 100;
    return `<div class="player-progress">
      <div class="pp-header">
        <span class="pp-name">${c.name}</span>
        <span class="pp-val" style="color:${c.color}">${positions[k]}/57</span>
      </div>
      <div class="pp-bar-bg">
        <div class="pp-bar" style="width:${pct}%;background:${c.color};box-shadow:0 0 8px ${c.color}66"></div>
      </div>
    </div>`;
  }).join('');
}

let rolling = false;
async function rollDice() {
  if (gameOver || rolling) return;
  rolling = true;
  document.getElementById('roll-btn').disabled = true;

  // Animate dice
  let frames = 0;
  const anim = setInterval(() => {
    document.getElementById('dice-display').textContent = DICE_FACES[Math.floor(Math.random()*6)];
    frames++;
    if (frames > 8) clearInterval(anim);
  }, 80);

  try {
    const res = await fetch(`${API}/games/ludo/roll`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error); rolling = false; document.getElementById('roll-btn').disabled=false; return; }

    setTimeout(() => {
      document.getElementById('dice-display').textContent = DICE_FACES[(data.playerDice||1) - 1];
      positions = data.positions;
      renderBars();

      if (data.finished) {
        gameOver = true;
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('btn-new').style.display = 'block';
        document.getElementById('nav-balance').textContent = parseFloat(data.newBalance).toLocaleString('es-AR');

        if (data.winner === 'player') {
          showMsg(`🏆 ¡GANASTE! Llegaste primero al centro. Premio: +$${parseFloat(data.prize).toLocaleString('es-AR')}`, 'win');
          renderPlayers('');
        } else {
          const winName = COLORS[data.winner]?.name || data.winner;
          showMsg(`😔 ${winName} llegó primero. Perdiste $${selectedBet.toLocaleString('es-AR')}`, 'loss');
          renderPlayers('');
        }
        refreshBalance();
      } else {
        // Show CPU moves
        const cpuMsg = (data.cpuResults || []).map(r => `${COLORS[r.name]?.name} tiró ${r.dice} → posición ${r.pos}`).join(' · ');
        showMsg(`Tiraste ${data.playerDice} → posición ${positions.player}. ${cpuMsg}`, 'info');
        renderPlayers('player');
        rolling = false;
        document.getElementById('roll-btn').disabled = false;
      }
    }, 700);
  } catch(e) { rolling = false; document.getElementById('roll-btn').disabled = false; }
}

function showMsg(text, type = 'info') {
  const el = document.getElementById('msg-box');
  el.textContent = text;
  el.className = `msg-box msg-${type}`;
  el.style.display = 'block';
}

function newGame() {
  sessionId = null; selectedBet = 0; gameOver = false;
  positions = { player:0, cpu1:0, cpu2:0 };
  document.getElementById('bet-panel').style.display = 'block';
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('selected-bet-display').textContent = '—';
  document.getElementById('dice-display').textContent = '🎲';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
}
</script>
</body>
</html>
