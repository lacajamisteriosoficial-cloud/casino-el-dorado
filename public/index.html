<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino El Dorado — Ingresá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #F0D080; --gold-dark: #8B6914;
  --dark: #060608; --dark2: #0E0E14; --dark3: #16161F;
  --border: rgba(201,168,76,0.2); --text: #E8DCC8; --text-dim: #7A7060; --red: #9B2335;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-layers { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.bg-layers::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,0,0,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201,168,76,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 0% 50%, rgba(139,0,0,0.1) 0%, transparent 50%);
}
.bg-pattern {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
}
.wrapper {
  position: relative; z-index: 1; display: flex; flex-direction: column;
  align-items: center; width: 100%; max-width: 420px; padding: 20px;
}
.logo-area { text-align: center; margin-bottom: 40px; }
.logo-suit {
  font-size: 2.5rem; filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
  margin-bottom: 12px; display: block; animation: pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { filter: drop-shadow(0 0 15px rgba(201,168,76,0.4)); }
  50% { filter: drop-shadow(0 0 35px rgba(201,168,76,0.9)); }
}
.logo-title {
  font-family: 'Cinzel Decorative', serif; font-size: 2.4rem; font-weight: 900;
  background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 3px; line-height: 1;
}
.logo-sub {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 6px;
  color: var(--text-dim); text-transform: uppercase; margin-top: 8px;
}
.auth-card {
  width: 100%; background: linear-gradient(160deg, var(--dark2), var(--dark3));
  border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.05);
}
.card-header {
  padding: 20px 32px 0; border-bottom: 1px solid var(--border);
  font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold); text-align: center; padding-bottom: 16px;
}
.auth-body { padding: 32px; }
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 8px; font-family: 'Cinzel', serif;
}
.form-input {
  width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; color: var(--text);
  font-size: 0.9rem; font-family: 'Inter', sans-serif; transition: all 0.2s; outline: none;
}
.form-input:focus {
  border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.04);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}
.form-input::placeholder { color: rgba(255,255,255,0.15); }
.btn-primary-gold {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none; border-radius: 2px; color: #0A0805; font-family: 'Cinzel', serif;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s; margin-top: 8px;
}
.btn-primary-gold:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}
.btn-primary-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.error-msg {
  background: rgba(155,35,53,0.2); border: 1px solid rgba(155,35,53,0.5); border-radius: 2px;
  padding: 10px 14px; font-size: 0.82rem; color: #FF6B7A; margin-bottom: 16px; display: none;
}
.success-msg {
  background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); border-radius: 2px;
  padding: 10px 14px; font-size: 0.82rem; color: #5CDB95; margin-bottom: 16px; display: none;
}
.password-wrapper { position: relative; }
.show-pass {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; padding: 4px;
}
.footer-note {
  text-align: center; margin-top: 20px; font-size: 0.7rem; color: var(--text-dim); line-height: 1.6;
}
.footer-note a { color: var(--gold); text-decoration: none; }
.spinner {
  display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #0A0805; border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.suits-deco { position: fixed; font-size: 8rem; opacity: 0.025; pointer-events: none; z-index: 0; user-select: none; }
.suits-deco.tl { top: -20px; left: -20px; transform: rotate(-15deg); }
.suits-deco.br { bottom: -20px; right: -20px; transform: rotate(15deg); }
.invite-note {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15);
  margin-bottom: 20px; font-size: 0.78rem; color: var(--text-dim); line-height: 1.5;
}
.invite-note span { font-size: 1.2rem; }
</style>
</head>
<body>
<div class="bg-layers"><div class="bg-pattern"></div></div>
<div class="suits-deco tl">♠</div>
<div class="suits-deco br">♣</div>

<div class="wrapper">
  <div class="logo-area">
    <span class="logo-suit">♦</span>
    <div class="logo-title">El Dorado</div>
    <div class="logo-sub">Casino Online · Solo por Invitación</div>
  </div>

  <div class="auth-card">
    <div class="card-header">🔐 Acceso de Jugadores</div>
    <div class="auth-body">
      <div class="invite-note">
        <span>🎰</span>
        <div>Este casino es <strong style="color:var(--gold)">solo por invitación</strong>. Para obtener una cuenta contactá al administrador.</div>
      </div>

      <div class="error-msg" id="login-error"></div>
      <div class="success-msg" id="login-success"></div>

      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="login-username" type="text" placeholder="tu_usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="password-wrapper">
          <input class="form-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="show-pass" onclick="togglePass('login-password')">👁</button>
        </div>
      </div>

      <button class="btn-primary-gold" id="login-btn" onclick="doLogin()">Entrar al Casino</button>

      <div class="footer-note" style="margin-top:16px">
        ¿Problemas para ingresar? <a href="#">Contactá soporte</a>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('casino_token');
if (token) window.location.href = '/lobby.html';

function togglePass(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
function showSuccess(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showError('login-error', 'Completá todos los campos');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { showError('login-error', data.error || 'Usuario o contraseña incorrectos'); return; }
    localStorage.setItem('casino_token', data.token);
    localStorage.setItem('casino_user', JSON.stringify(data.user));
    showSuccess('login-success', '¡Bienvenido! Ingresando...');
    setTimeout(() => window.location.href = '/lobby.html', 800);
  } catch (e) {
    showError('login-error', 'Error de conexión. Intentá de nuevo.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Entrar al Casino';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
